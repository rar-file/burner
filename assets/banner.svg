<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" width="1200" height="320" role="img" aria-label="Burner — every site gets a different you">
  <defs>
    <linearGradient id="flame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb347"/>
      <stop offset=".55" stop-color="#ff6a3d"/>
      <stop offset="1" stop-color="#e5522a"/>
    </linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe3b3"/>
      <stop offset="1" stop-color="#ff8a5c"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".55" r=".6">
      <stop offset="0" stop-color="#ff6a3d" stop-opacity=".28"/>
      <stop offset="1" stop-color="#ff6a3d" stop-opacity="0"/>
    </radialGradient>
    <style>
      .base { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
      .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
      .flick { transform-box: fill-box; transform-origin: 50% 100%; animation: flick 3.2s ease-in-out infinite; }
      @keyframes flick {
        0%, 100% { transform: scaleY(1) scaleX(1); }
        30% { transform: scaleY(1.035) scaleX(.985); }
        60% { transform: scaleY(.99) scaleX(1.012); }
        80% { transform: scaleY(1.02) scaleX(.99); }
      }
      .ember { animation: rise 6s linear infinite; opacity: 0; }
      @keyframes rise {
        0% { transform: translateY(0); opacity: 0; }
        12% { opacity: .85; }
        70% { opacity: .4; }
        100% { transform: translateY(-190px); opacity: 0; }
      }
      .p { opacity: 0; animation: cyc 12s infinite; }
      .p2 { animation-delay: 4s; }
      .p3 { animation-delay: 8s; }
      @keyframes cyc {
        0% { opacity: 0; } 4% { opacity: 1; } 30% { opacity: 1; }
        36% { opacity: 0; } 100% { opacity: 0; }
      }
      @media (prefers-reduced-motion: reduce) {
        .flick, .ember { animation: none; }
        .p { animation: none; } .p1 { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="1200" height="320" rx="14" fill="#141416"/>
  <rect width="1200" height="320" rx="14" fill="none" stroke="#2a2a30" stroke-width="2"/>
  <ellipse cx="210" cy="170" rx="200" ry="150" fill="url(#glow)" opacity=".6"/>

  <g class="ember"><circle cx="150" cy="270" r="2.5" fill="#ffb347"/></g>
  <g class="ember" style="animation-delay:1.2s"><circle cx="255" cy="280" r="2" fill="#ff6a3d"/></g>
  <g class="ember" style="animation-delay:2.6s"><circle cx="185" cy="285" r="1.6" fill="#ffe3b3"/></g>
  <g class="ember" style="animation-delay:3.4s"><circle cx="235" cy="275" r="2.2" fill="#ff8a5c"/></g>
  <g class="ember" style="animation-delay:4.7s"><circle cx="165" cy="278" r="1.8" fill="#ff6a3d"/></g>

  <g transform="translate(112,62) scale(1.95)">
    <g class="flick">
    <path fill="url(#flame)" d="M50 4
      C 53 18, 68 26, 73 44
      C 77 60, 70 80, 50 88
      C 30 80, 23 60, 27 44
      C 30 33, 38 28, 42 16
      C 44 24, 49 27, 50 20
      C 51 14, 50 9, 50 4 Z"/>
    <path fill="url(#core)" d="M50 40
      C 55 49, 61 53, 60 63
      C 59 72, 55 77, 50 79
      C 45 77, 41 72, 40 63
      C 39 53, 45 49, 50 40 Z"/>
    </g>
  </g>

  <text class="base" x="360" y="152" font-size="92" font-weight="800" fill="#ececf0" letter-spacing="-2">Burner</text>
  <text class="base" x="366" y="204" font-size="27" fill="#9a9aa3">Every site gets a different you. One click, 100% local.</text>

  <g class="mono" font-size="19">
    <text class="p p1" x="366" y="252" fill="#6c6c75">netflix.com <tspan fill="#ececf0">→ Daryl Abbott</tspan> <tspan fill="#ff6a3d">· dabbott65@yahoo.com</tspan></text>
    <text class="p p2" x="366" y="252" fill="#6c6c75">spotify.com <tspan fill="#ececf0">→ Caroline Atkinson</tspan> <tspan fill="#ff6a3d">· you+spotify.k3f@gmail.com</tspan></text>
    <text class="p p3" x="366" y="252" fill="#6c6c75">airbnb.com <tspan fill="#ececf0">→ Marco Rossi</tspan> <tspan fill="#ff6a3d">· airbnb.x7q@mydomain.com</tspan></text>
  </g>
</svg>
