<!doctype html>
<html>
<head><meta charset="utf-8"><title>Demo signup</title>
<style>
  body { font-family: sans-serif; max-width: 460px; margin: 30px auto; }
  label { display: block; margin-top: 10px; font-size: 13px; color: #333; }
  input, select { width: 100%; padding: 6px; margin-top: 3px; box-sizing: border-box; }
  .row { display: flex; gap: 8px; }
  .row > * { flex: 1; }
  button { margin-top: 16px; padding: 8px 20px; }
</style>
</head>
<body>
<h2>Create your account</h2>
<form id="signup">
  <div class="row">
    <label>First name<input name="fname" type="text"></label>
    <label>Last name<input name="lname" type="text"></label>
  </div>
  <label>Email address<input name="email" type="email"></label>
  <label>Confirm email<input name="email_confirm" type="text"></label>
  <label>Choose a username<input id="username" type="text"></label>
  <label>Password<input name="password" type="password"></label>
  <label>Repeat password<input name="password_repeat" type="password"></label>
  <label>Mobile phone<input type="tel" placeholder="Phone number"></label>
  <label>Date of birth</label>
  <div class="row">
    <select name="dob_day"><option value="">Day</option></select>
    <select name="dob_month"><option value="">Month</option>
      <option value="1">January</option><option value="2">February</option>
      <option value="3">March</option><option value="4">April</option>
      <option value="5">May</option><option value="6">June</option>
      <option value="7">July</option><option value="8">August</option>
      <option value="9">September</option><option value="10">October</option>
      <option value="11">November</option><option value="12">December</option>
    </select>
    <select name="dob_year"><option value="">Year</option></select>
  </div>
  <label>Gender</label>
  <label><input type="radio" name="gender" value="male"> Male</label>
  <label><input type="radio" name="gender" value="female"> Female</label>
  <label>Anniversary (date input)<input type="date" name="bday" autocomplete="bday"></label>
  <label><input type="checkbox" name="tos" style="width:auto"> I agree to the terms</label>
  <button type="button">Sign up</button>
</form>
<script>
  const day = document.querySelector('[name=dob_day]');
  for (let i = 1; i <= 31; i++) day.add(new Option(i, i));
  const year = document.querySelector('[name=dob_year]');
  for (let y = 2008; y >= 1940; y--) year.add(new Option(y, y));
</script>
</body>
</html>
